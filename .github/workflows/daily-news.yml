name: 📰 Daily Fashion News

on:
  schedule:
    # Run at 8:00 AM and 14:00 PM Beijing time every day
    - cron: '0 0,6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  crawl-news:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          playwright install chromium
      
      - name: Run news crawler
        env:
          COZE_SUPABASE_URL: ${{ secrets.COZE_SUPABASE_URL }}
          COZE_SUPABASE_ANON_KEY: ${{ secrets.COZE_SUPABASE_ANON_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python backend/scripts/daily_news.py
      
      - name: Commit results
        run: |
          echo "News crawl completed at $(date)"
